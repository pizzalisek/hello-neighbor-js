<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Neighbor JS - Prototyp 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: white; background: rgba(0,0,0,0.7); 
            padding: 15px; border-radius: 8px; pointer-events: none; 
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border-radius: 50%;
            background: white; border: 1px solid black;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>Hello Neighbor JS</b><br>
        Ruch: W, A, S, D<br>
        Myszka: Obracanie kamery<br>
        Kliknij ekran, aby zaczac
    </div>
    <div id="crosshair"></div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENA I KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202040); // Nocny klimat
        scene.fog = new THREE.Fog(0x202040, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- OSWIETLENIE ---
        const ambient = new THREE.AmbientLight(0x404040, 0.5); 
        scene.add(ambient);

        // Latarka gracza
        const flashlight = new THREE.SpotLight(0xffffff, 50);
        flashlight.angle = Math.PI / 6;
        flashlight.penumbra = 0.3;
        flashlight.castShadow = true;
        camera.add(flashlight);
        flashlight.position.set(0, 0, 0);
        flashlight.target.position.set(0, 0, -1);
        camera.add(flashlight.target);
        scene.add(camera);

        // --- OTOCZENIE ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x113311 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Prosty dom sasiada
        const house = new THREE.Mesh(
            new THREE.BoxGeometry(12, 10, 12),
            new THREE.MeshStandardMaterial({ color: 0x4a2c2a })
        );
        house.position.set(0, 5, -20);
        house.castShadow = true;
        house.receiveShadow = true;
        scene.add(house);

        // --- LADOWANIE MODELU SASIADA ---
        const loader = new GLTFLoader();
        let sasiadModel = null;

        loader.load('./sasiad.glb', (gltf) => {
            sasiadModel = gltf.scene;
            sasiadModel.position.set(0, 0, -12); // Stoi przed domem
            sasiadModel.traverse(n => { if (n.isMesh) n.castShadow = true; });
            scene.add(sasiadModel);
            console.log("Sasiad jest na miejscu!");
        }, undefined, (err) => {
            console.error("Nie znaleziono pliku sasiad.glb. Sprawdz folder!");
        });

        // --- STEROWANIE ---
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- PETLA GRY ---
        const velocity = new THREE.Vector3();
        camera.position.set(0, 1.7, 5);

        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement === document.body) {
                const speed = 0.12;
                const dir = new THREE.Vector3();
                
                if (keys['KeyW']) camera.translateZ(-speed);
                if (keys['KeyS']) camera.translateZ(speed);
                if (keys['KeyA']) camera.translateX(-speed);
                if (keys['KeyD']) camera.translateX(speed);
                
                camera.position.y = 1.7; // Blokada wysokosci
            }

            // Prosta animacja "patrzenia" sasiada na gracza
            if (sasiadModel) {
                sasiadModel.lookAt(camera.position.x, 0, camera.position.z);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
