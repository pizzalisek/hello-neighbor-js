<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hello Neighbor JS - Prototyp 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Sterowanie: W,A,S,D | Myszka: Obrót (kliknij, by zacząć)</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- KONFIGURACJA SCENY ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Błękitne niebo
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ŚWIATŁO ---
        const light = new THREE.AmbientLight(0x404040); 
        scene.add(light);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 10, 7.5);
        scene.add(sunLight);

        // --- PODŁOGA (Trawa przed domem) ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- PROSTY DOM SĄSIADA ---
        const houseGeo = new THREE.BoxGeometry(10, 8, 10);
        const houseMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const house = new THREE.Mesh(houseGeo, houseMat);
        house.position.y = 4;
        house.position.z = -15;
        scene.add(house);

        // --- STEROWANIE ---
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        // Blokada myszki dla efektu FPS
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
            }
        });

        camera.position.y = 1.6; // Wysokość wzroku gracza
        camera.rotation.order = 'YXZ';

        // --- PĘTLA ANIMACJI ---
        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement === document.body) {
                const speed = 0.15;
                if (moveForward) camera.translateZ(-speed);
                if (moveBackward) camera.translateZ(speed);
                if (moveLeft) camera.translateX(-speed);
                if (moveRight) camera.translateX(speed);
                camera.position.y = 1.6; // Trzymamy gracza na ziemi
            }

            renderer.render(scene, camera);
        }

        animate();

        // Skalowanie okna
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
